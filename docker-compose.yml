services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streamlit-app
    ports:
      - "${PORT:-8501}:8501"
    environment:
      PYTHONUNBUFFERED: "1"
      PIP_NO_CACHE_DIR: "1"
    volumes:
      - .:/app
    command: >
      streamlit run app.py
      --server.address=0.0.0.0
      --server.port=8501
    restart: unless-stopped
    # If your PyPI wheel is x86_64-only and you’re on Apple Silicon, uncomment:
    platform: linux/amd64